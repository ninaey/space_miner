databases:
  - name: spaceminer-db
    plan: free
    databaseName: spaceminergame
    user: spaceminergame_user

services:
  - type: web
    name: space-colony-miner
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: "8080"
      - key: STATIC_DIR
        value: /app/public
      - key: DATABASE_URL
        fromDatabase:
          name: spaceminergame
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false
      # Must use the same Login Project UUID as the frontend Login widget (AuthScreen XSOLLA_LOGIN_PROJECT_ID).
      # Example: https://login.xsolla.com/api/projects/<UUID>/jwks.json — wrong UUID → 401 invalid token on create-payment.
      - key: XSOLLA_JWKS_URL
        sync: false
      - key: XSOLLA_ISSUER
        value: https://login.xsolla.com
      - key: XSOLLA_AUDIENCE
        sync: false
      - key: XSOLLA_PROJECT_ID
        value: "304856"
      - key: XSOLLA_MERCHANT_ID
        value: "879363"
      - key: XSOLLA_API_KEY
        sync: false
      # Pay Station token (POST .../admin/payment/token) — must match Publisher Account
      # Set sandbox true/false to match Pay Station mode in the project (sandbox vs live).
      - key: XSOLLA_PAYSTATION_SANDBOX
        sync: false
      - key: XSOLLA_PAYSTATION_CURRENCY
        sync: false
      - key: XSOLLA_PAYSTATION_LANGUAGE
        value: "en"
      # Optional: ISO 3166-1 alpha-2 (e.g. MY). Helps if the host does not expose a public client IP.
      - key: XSOLLA_PAYSTATION_COUNTRY
        sync: false
      - key: XSOLLA_WEBHOOK_SECRET
        sync: false
      - key: XSOLLA_CATALOG_URL
        value: ""
